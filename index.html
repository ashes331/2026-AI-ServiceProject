<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 진로상담 서비스</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 500px; background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #007aff; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #f2f2f7; color: #1c1c1e; border-bottom-left-radius: 4px; }
        .loading { font-size: 13px; color: #8e8e93; margin-left: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .input-area { border-top: 1px solid #efeff4; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #d1d1d6; padding: 12px 16px; border-radius: 25px; outline: none; font-size: 15px; }
        button { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div style="padding: 15px; text-align: center; border-bottom: 1px solid #efeff4; font-weight: bold;">AI 진로상담소 (feat. 잠꾸러기)</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="잠꾸러기에게 고민을 털어놔보세요..." onkeypress="if(event.keyCode==13) askAI()">
            <button onclick="askAI()">전송</button>
        </div>
    </div>

    <script>
        function appendMsg(cls, text, isError = false) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${cls}`;
            if (isError) div.style.color = 'red';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function askAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const question = input.value;
            appendMsg('user', question);

            const loadingEl = document.createElement('div');
            loadingEl.className = 'loading';
            loadingEl.textContent = '잠꾸러기가 답변을 가져오는 중...💤';
            chatBox.appendChild(loadingEl);
            chatBox.scrollTop = chatBox.scrollHeight;

            input.value = '';

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 60000);

                const response = await fetch('https://hook.us2.make.com/0o3c652emvls2hst8p9xyfnwa8pjn864', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                    signal: controller.signal
                });

                clearTimeout(timeout);
                const text = await response.text();
                loadingEl.remove();

                appendMsg('ai', text.trim());

            } catch (error) {
                loadingEl.remove();
                const msg = error.name === 'AbortError'
                    ? '시간이 너무 오래 걸려요. 질문을 조금 짧게 해볼까요?'
                    : '잠꾸러기가 너무 깊이 잠들었나봐요. 다시 한번만 깨워주세요!';
                appendMsg('ai', msg, true);
                console.error('에러:', error);
            }
        }
    </script>
</body>
</html>
