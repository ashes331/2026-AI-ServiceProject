<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 진로상담소 feat. 잠꾸러기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0d0d1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 배경 별빛 효과 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(75, 0, 130, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(25, 0, 50, 0.8) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            height: 90vh;
            max-height: 780px;
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(147, 51, 234, 0.3);
            box-shadow:
                0 0 60px rgba(147, 51, 234, 0.2),
                0 0 120px rgba(75, 0, 130, 0.15),
                inset 0 1px 0 rgba(255,255,255,0.08);
            background: rgba(13, 8, 30, 0.92);
            backdrop-filter: blur(20px);
        }

        /* 헤더 */
        .header {
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(88, 28, 135, 0.6), rgba(49, 10, 80, 0.8));
            border-bottom: 1px solid rgba(147, 51, 234, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .header-character {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }

        .header-info {
            flex: 1;
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            color: #e9d5ff;
            letter-spacing: -0.3px;
        }

        .header-sub {
            font-size: 11px;
            color: rgba(196, 148, 255, 0.6);
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #a855f7;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            50% { box-shadow: 0 0 0 5px rgba(168, 85, 247, 0); }
        }

        .end-btn {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.2s;
            letter-spacing: -0.3px;
        }

        .end-btn:hover { background: rgba(239, 68, 68, 0.3); border-color: rgba(239, 68, 68, 0.5); }
        .end-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 채팅 영역 */
        #chat-box {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(147, 51, 234, 0.3); border-radius: 2px; }

        /* 메시지 */
        .msg-wrap {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-wrap.user { flex-direction: row-reverse; }

        .ai-avatar {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .msg {
            padding: 11px 15px;
            border-radius: 18px;
            max-width: 78%;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            letter-spacing: -0.2px;
        }

        .msg.ai {
            background: rgba(88, 28, 135, 0.35);
            color: #e9d5ff;
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 12px rgba(88, 28, 135, 0.2);
        }

        .msg.user {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #f3e8ff;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.3);
        }

        .msg.system {
            align-self: center;
            background: rgba(147, 51, 234, 0.1);
            color: rgba(196, 148, 255, 0.7);
            font-size: 12px;
            border: 1px solid rgba(147, 51, 234, 0.15);
            border-radius: 12px;
            padding: 7px 14px;
            text-align: center;
            max-width: 90%;
        }

        /* 로딩 */
        .loading-wrap {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(88, 28, 135, 0.35);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 18px;
            border-bottom-left-radius: 6px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: rgba(196, 148, 255, 0.6);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 입력 영역 */
        .input-area {
            padding: 14px 16px;
            background: rgba(20, 10, 40, 0.8);
            border-top: 1px solid rgba(147, 51, 234, 0.15);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            background: rgba(88, 28, 135, 0.15);
            border: 1px solid rgba(147, 51, 234, 0.25);
            color: #e9d5ff;
            padding: 11px 16px;
            border-radius: 22px;
            outline: none;
            font-size: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            letter-spacing: -0.2px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder { color: rgba(196, 148, 255, 0.35); }
        input:focus {
            border-color: rgba(147, 51, 234, 0.5);
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.1);
        }
        input:disabled { opacity: 0.4; }

        .send-btn {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.4);
        }

        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>

<!-- 별빛 배경 -->
<div class="stars" id="stars"></div>

<div class="chat-container">
    <div class="header">
        <!-- 달 캐릭터 SVG -->
        <svg class="header-character" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 보름달 빛 번짐 -->
            <circle cx="20" cy="22" r="17" fill="rgba(255,255,240,0.08)"/>
            <circle cx="20" cy="22" r="14" fill="rgba(255,255,240,0.1)"/>
            <!-- 보름달 본체 -->
            <circle cx="20" cy="22" r="12" fill="#f0f0e8"/>
            <circle cx="20" cy="22" r="11.5" fill="#fafaf5"/>
            <!-- 달 표면 크레이터 -->
            <circle cx="15" cy="18" r="2" fill="rgba(200,200,190,0.4)"/>
            <circle cx="25" cy="24" r="1.5" fill="rgba(200,200,190,0.35)"/>
            <circle cx="18" cy="27" r="1" fill="rgba(200,200,190,0.3)"/>
            <!-- 눈 (감긴) -->
            <path d="M15 21 Q17 19.5 19 21" stroke="#9ca3af" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <path d="M21 21 Q23 19.5 25 21" stroke="#9ca3af" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <!-- 볼터치 -->
            <ellipse cx="14" cy="23.5" rx="2.2" ry="1.4" fill="rgba(251,113,133,0.3)"/>
            <ellipse cx="26" cy="23.5" rx="2.2" ry="1.4" fill="rgba(251,113,133,0.3)"/>
            <!-- 입 -->
            <path d="M17 25.5 Q20 27.5 23 25.5" stroke="#9ca3af" stroke-width="1.2" stroke-linecap="round" fill="none"/>
            <!-- Z 수면 -->
            <text x="33" y="14" font-size="5.5" fill="#c4b5fd" font-weight="bold" opacity="0.9">z</text>
            <text x="36" y="10" font-size="4.5" fill="#c4b5fd" font-weight="bold" opacity="0.6">z</text>
        </svg>

        <div class="header-info">
            <div class="header-title">잠꾸러기 진로상담소</div>
            <div class="header-sub"><span class="status-dot"></span>졸면서도 상담 중...</div>
        </div>
        <button class="end-btn" onclick="endSession()">상담 종료</button>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="고민을 털어놔봐..." onkeypress="if(event.keyCode==13) askAI()">
        <button class="send-btn" id="sendBtn" onclick="askAI()">
            <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
        </button>
    </div>
</div>

<script>
    // 별 생성
    var starsEl = document.getElementById('stars');
    for (var i = 0; i < 80; i++) {
        var star = document.createElement('div');
        star.className = 'star';
        var size = Math.random() * 2.5 + 0.5;
        star.style.cssText = [
            'width:' + size + 'px',
            'height:' + size + 'px',
            'left:' + Math.random() * 100 + '%',
            'top:' + Math.random() * 100 + '%',
            '--duration:' + (Math.random() * 3 + 2) + 's',
            'animation-delay:' + Math.random() * 3 + 's'
        ].join(';');
        starsEl.appendChild(star);
    }

    var chatHistory = [];
    var userName = '';
    var isEnded = false;

    // AI 아바타 SVG (보름달 캐릭터)
    var avatarSVG = '<svg class="ai-avatar" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="15" cy="15" r="11" fill="rgba(255,255,240,0.1)"/><circle cx="15" cy="15" r="9" fill="#fafaf5"/><circle cx="11" cy="12" r="1.3" fill="rgba(200,200,190,0.4)"/><circle cx="19" cy="17" r="1" fill="rgba(200,200,190,0.35)"/><path d="M11 14.5 Q12.5 13 14 14.5" stroke="#9ca3af" stroke-width="1" stroke-linecap="round" fill="none"/><path d="M16 14.5 Q17.5 13 19 14.5" stroke="#9ca3af" stroke-width="1" stroke-linecap="round" fill="none"/><ellipse cx="10" cy="16" rx="1.5" ry="1" fill="rgba(251,113,133,0.3)"/><ellipse cx="20" cy="16" rx="1.5" ry="1" fill="rgba(251,113,133,0.3)"/><path d="M12 18 Q15 20 18 18" stroke="#9ca3af" stroke-width="0.9" stroke-linecap="round" fill="none"/><text x="22" y="9" font-size="4" fill="#c4b5fd" font-weight="bold" opacity="0.8">z</text></svg>';

    function appendMsg(cls, text, isError) {
        var chatBox = document.getElementById('chat-box');

        if (cls === 'system') {
            var div = document.createElement('div');
            div.className = 'msg system';
            if (isError) div.style.color = '#f87171';
            div.textContent = text;
            chatBox.appendChild(div);
        } else if (cls === 'ai') {
            var wrap = document.createElement('div');
            wrap.className = 'msg-wrap';
            wrap.innerHTML = avatarSVG + '<div class="msg ai"></div>';
            wrap.querySelector('.msg').textContent = text;
            chatBox.appendChild(wrap);
        } else {
            var wrap = document.createElement('div');
            wrap.className = 'msg-wrap user';
            wrap.innerHTML = '<div class="msg user"></div>';
            wrap.querySelector('.msg').textContent = text;
            chatBox.appendChild(wrap);
        }

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function createLoading() {
        var chatBox = document.getElementById('chat-box');
        var wrap = document.createElement('div');
        wrap.className = 'loading-wrap';
        wrap.innerHTML = avatarSVG + '<div class="loading-dots"><span></span><span></span><span></span></div>';
        chatBox.appendChild(wrap);
        chatBox.scrollTop = chatBox.scrollHeight;
        return wrap;
    }

    function historyToText() {
        return chatHistory.map(function(m) {
            var role = m.role === 'user' ? '사용자' : '잠꾸러기';
            return role + ': ' + m.content;
        }).join('\n');
    }

    // 초기 인사
    var greeting = [
        '안녕하세요! 저는 진로 상담가 잠꾸러기에요 😊',
        '낮잠을 좋아하지만, 진로 고민만큼은 진지하게 해드릴께요!',
        '',
        '먼저 당신의 이름을 알려줄래요? 더 친근하게 이야기 나눌 수 있을 것 같아요 🌙'
    ].join('\n');
    appendMsg('ai', greeting);

    async function sendToMake(payload) {
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, 60000);
        var response = await fetch('https://hook.us2.make.com/0o3c652emvls2hst8p9xyfnwa8pjn864', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: controller.signal
        });
        clearTimeout(timeout);
        return await response.text();
    }

    async function askAI() {
        if (isEnded) return;
        var input = document.getElementById('userInput');
        if (!input.value.trim()) return;

        var question = input.value.trim();
        appendMsg('user', question);

        if (!userName && question.length <= 10) userName = question;
        chatHistory.push({ role: 'user', content: question });

        var loadingEl = createLoading();
        input.value = '';

        try {
            var text = await sendToMake({ type: 'chat', question: historyToText(), name: userName });
            loadingEl.remove();
            var answer = text.trim();
            appendMsg('ai', answer);
            chatHistory.push({ role: 'assistant', content: answer });
        } catch (error) {
            loadingEl.remove();
            var msg = error.name === 'AbortError'
                ? '시간이 너무 오래 걸려요. 질문을 짧게 해볼까요?'
                : '잠꾸러기가 너무 깊이 잠들었나봐요. 다시 깨워주세요!';
            appendMsg('ai', msg);
        }
    }

    async function endSession() {
        if (isEnded) return;
        if (chatHistory.length === 0) {
            appendMsg('system', '대화 내용이 없어요. 먼저 이야기해봐요!');
            return;
        }

        isEnded = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('userInput').disabled = true;
        document.querySelector('.end-btn').disabled = true;

        appendMsg('system', '상담을 마무리하고 있어요... 💤');
        var loadingEl = createLoading();

        try {
            await sendToMake({ type: 'end', question: historyToText(), name: userName });
            loadingEl.remove();
            appendMsg('system', '상담 결과가 저장됐어요! 잠꾸러기가 응원할게요 🌙✨');
        } catch (error) {
            loadingEl.remove();
            appendMsg('system', '저장 중 오류가 발생했어요.', true);
            isEnded = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('userInput').disabled = false;
            document.querySelector('.end-btn').disabled = false;
        }
    }
</script>
</body>
</html>
