<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 진로상담 서비스</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 500px; background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; word-break: break-word; }
        .user { align-self: flex-end; background: #007aff; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #f2f2f7; color: #1c1c1e; border-bottom-left-radius: 4px; }
        .loading { font-size: 13px; color: #8e8e93; margin-left: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .input-area { border-top: 1px solid #efeff4; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #d1d1d6; padding: 12px 16px; border-radius: 25px; outline: none; font-size: 15px; }
        button { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div style="padding: 15px; text-align: center; border-bottom: 1px solid #efeff4; font-weight: bold;">AI 진로상담소 (feat. 잠꾸러기)</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="잠꾸러기에게 고민을 털어놔보세요..." onkeypress="if(event.keyCode==13) askAI()">
            <button onclick="askAI()">전송</button>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const question = input.value;
            chatBox.innerHTML += `<div class="msg user">${question}</div>`;
            
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="loading">잠꾸러기가 꿈속에서 답을 찾는 중...💤</div>`;
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 연결 대기 시간 설정을 위한 컨트롤러 (네트워크 환경 대응)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000); // 60초까지 기다림

            try {
                const response = await fetch('https://hook.us2.make.com/0o3c652emvls2hst8p9xyfnwa8pjn864', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                const textData = await response.text();
                // 데이터가 비어있지 않은지 확인
                if (!textData) throw new Error('응답 데이터가 비어있습니다.');
                
                const data = JSON.parse(textData);

                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="msg ai">${data.answer || "잠꾸러기가 대답을 잊어버렸나봐요."}</div>`;
            } catch (error) {
                clearTimeout(timeoutId);
                console.error("상세 에러:", error);
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                
                let errorMsg = "잠꾸러기가 너무 깊이 잠들었나봐요. 다시 깨워주세요!";
                if (error.name === 'AbortError') errorMsg = "답변이 너무 길어 잠꾸러기가 지쳤나봐요. 조금 짧게 물어봐주세요!";
                
                chatBox.innerHTML += `<div class="msg ai" style="color:red;">${errorMsg}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
